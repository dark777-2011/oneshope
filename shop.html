body {

}
 
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
     radial-gradient(circle at 20% 20%, rgba(168,85,247,0.15), transparent 45%),

  pointer-events:none;
}

    /* كروت المنتجات باللون السكني الميتاليك والمحدد بالأزرق النيون الخفيف */
.cyber-card {
  background: rgba(168,85,247,0.05);
  border: 1px solid rgba(168,85,247,0.15);
  border-radius: 18px;
  backdrop-filter: blur(18px);
  transition: 0.4s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.cyber-card:hover {
  transform: translateY(-8px) scale(1.02);
  border-color: rgba(168,85,247,0.8);
  box-shadow:
    0 25px 80px rgba(0,0,0,0.7),
    0 0 40px rgba(168,85,247,0.35),
    inset 0 0 20px rgba(168,85,247,0.08);
}

    /* سكرول بار متناسق وفخم */

    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: rgba(15, 88, 127, 0.4) ; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #0a3a54; }

    @keyframes fadeInDown {
  from {
    opacity: 0;
    transform: translate(-50%, -20px);
  }
  to {
    opacity: 1;
    transform: translate(-50%, 0);

}

  }
];

const packageProducts = [
  {

    desc: '20 الف كاش',
    price: 7,
    tag: 'حزمة',

  },
  {

    title: 'حزمة العصابات',

    price: 10,
    tag: 'حزمة',

  },
  {

    price: 0,

    popular: true,

];

let products = [...storeProducts];

    const grid = document.getElementById('grid');
    const search = document.getElementById('search');
    const category = document.getElementById('category');
    const sort = document.getElementById('sort');
    const resetFilters = document.getElementById('resetFilters');
    const cartBtn = document.getElementById('cartBtn');
    const cartDrawer = document.getElementById('cartDrawer');
    const closeCart = document.getElementById('closeCart');
    const cartItems = document.getElementById('cartItems');
    const cartCount = document.getElementById('cartCount');
    const cartTotal = document.getElementById('cartTotal');
    const productModal = document.getElementById('productModal');
    const mTitle = document.getElementById('mTitle');
    const mDesc = document.getElementById('mDesc');
    const mPrice = document.getElementById('mPrice');
    const mTag = document.getElementById('mTag');
    const mAdd = document.getElementById('mAdd');
    const mClose = document.getElementById('mClose');
    const mInstantBuy = document.getElementById('mInstantBuy'); // استدعاء زر الشراء الفوري

    let state = { q: '', cat: 'all', sort: 'popular' };
    let cart = [];
    let selectedProduct = null;

    function card(p){
      return `
        <div class="cyber-card rounded-2xl p-4 flex flex-col justify-between relative group overflow-hidden">
          <div>
            <div class="aspect-[16/10] rounded-xl overflow-hidden mb-4 bg-slate-950 relative border border-white/5">
              <img src="${p.img}" alt="${p.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 select-none"/>
              <div class="absolute top-3 right-3 px-2.5 py-1 rounded-lg text-[10px] font-black bg-slate-950/80 backdrop-blur text-purple-400 border border-purple-500/30 tracking-wide">${p.tag}</div>
            </div>
            <h3 class="font-bold text-base text-white/95 leading-tight line-clamp-1 group-hover:text-purple-400 transition-colors duration-300">${p.title}</h3>
            <p class="text-slate-400 text-xs mt-2 leading-relaxed line-clamp-2">${p.desc}</p>
          </div>
          <div class="mt-6 pt-4 border-t border-white/5 flex items-center justify-between">
            <div class="flex flex-col">
              <span class="text-[9px] text-slate-500 font-bold uppercase tracking-wider">السعر التقديري</span>
              <span class="text-lg font-black text-white">${p.price} <span class="text-xs font-normal text-slate-400">$</span></span>
            </div>
            <div class="flex gap-1.5">
              <button data-id="${p.id}" class="btn-view px-3 py-2 rounded-lg text-xs font-bold bg-white/5 hover:bg-white/10 text-slate-300 border border-white/5 transition-all">تفاصيل</button>
              <button data-id="${p.id}" class="btn-add px-4 py-2 rounded-lg text-xs font-black bg-purple-600 hover:bg-purple-500 text-white transition-all active:scale-95 shadow-lg shadow-blue-600/10">إضافة</button>
            </div>
          </div>
        </div>
      `;
    }

    function render(){
      let list = [...products];
      if(state.q){ const q = state.q.toLowerCase(); list = list.filter(p => (p.title+p.desc+p.tag).toLowerCase().includes(q)); }
      if(state.cat !== 'all') list = list.filter(p => p.cat === state.cat);
      if(state.sort==='price-asc') list.sort((a,b)=>a.price-b.price);
      else if(state.sort==='price-desc') list.sort((a,b)=>b.price-a.price);
      else list.sort((a,b)=> (b.popular - a.popular) || a.price - b.price);
      grid.innerHTML = list.length ? list.map(card).join('') : `<div class="col-span-full py-16 text-center text-slate-500 font-bold text-sm tracking-wide">لا توجد منتجات تطابق بحثك حالياً...</div>`;

      document.querySelectorAll('.btn-view').forEach(btn=>btn.addEventListener('click', e=>{
        const id = +e.currentTarget.dataset.id;
        const p = products.find(x=>x.id===id);
        if(!p) return;
        selectedProduct=p;
        mTitle.textContent=p.title;
        mDesc.textContent=p.desc;
        mPrice.innerHTML=p.price+' <span class="text-xs font-medium text-slate-500">$</span>';
        mTag.textContent=p.tag;
        productModal.classList.remove('hidden'); productModal.classList.add('flex');
      }));
      document.querySelectorAll('.btn-add').forEach(btn=>btn.addEventListener('click', e=>{
        const id = +e.currentTarget.dataset.id; addToCart(id);
      }));
    }

    function addToCart(id){
      const p=products.find(x=>x.id===id); if(!p) return;
      const exist=cart.find(x=>x.id===id);
      if(exist) exist.qty+=1; else cart.push({...p,qty:1});
      updateCart();
    }

    function updateCart(){
      cartCount.textContent=cart.reduce((s,i)=>s+i.qty,0);
      const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
      cartTotal.textContent=total.toFixed(2)+' $';
      cartItems.innerHTML=cart.length ? cart.map(item=>
        `<div class="p-4 rounded-xl bg-slate-900 border border-white/5 flex items-center justify-between gap-4">
          <div>
            <div class="font-bold text-sm text-white/90">${item.title}</div>
            <div class="text-xs text-purple-400 mt-1 font-bold">${item.price} $ × ${item.qty}</div>
          </div>
          <div class="flex items-center gap-1">
            <button class="w-6 h-6 flex items-center justify-center rounded bg-white/5 hover:bg-white/10 text-xs font-bold" onclick="changeQty(${item.id},-1)">-</button>
            <button class="w-6 h-6 flex items-center justify-center rounded bg-white/5 hover:bg-white/10 text-xs font-bold" onclick="changeQty(${item.id},1)">+</button>
            <button class="px-2.5 py-1 rounded bg-rose-500/10 hover:bg-rose-500 text-[11px] font-bold text-rose-400 hover:text-white transition ml-1" onclick="removeFromCart(${item.id})">حذف</button>
          </div>
        </div>`).join('') : `<div class="text-center py-12 text-slate-600 text-xs font-bold tracking-wide">لم تقم بإضافة أي خدمة بعد.</div>`;
    }

    window.changeQty=function(id,delta){ const it=cart.find(x=>x.id===id); if(!it) return; it.qty+=delta; if(it.qty<=0) cart=cart.filter(x=>x.id!==id); updateCart(); }
    window.removeFromCart=function(id){ cart=cart.filter(x=>x.id!==id); updateCart(); }

    search.addEventListener('input', e=>{ state.q=e.target.value.trim(); render(); });
    category.addEventListener('change', e=>{ state.cat=e.target.value; render(); });
    sort.addEventListener('change', e=>{ state.sort=e.target.value; render(); });
    resetFilters.addEventListener('click', ()=>{ state={q:'',cat:'all',sort:'popular'}; search.value=''; category.value='all'; sort.value='popular'; render(); });
    cartBtn.addEventListener('click', ()=>{ cartDrawer.style.transform='translateX(0)'; });
    closeCart.addEventListener('click', ()=>{ cartDrawer.style.transform='translateX(-100%)'; });
    mClose.addEventListener('click', ()=>{ productModal.classList.add('hidden'); productModal.classList.remove('flex'); });
    productModal.addEventListener('click',(e)=>{ if(e.target===productModal){ mClose.click(); } });
    mAdd.addEventListener('click', ()=>{ if(selectedProduct){ addToCart(selectedProduct.id); mClose.click(); } });
    
    // ربط زر الشراء الفوري بفتح رابط روم الديسكورد مباشرة
    mInstantBuy.addEventListener('click', () => {
      window.open('https://discord.com/channels/1466423051838292060/1478541701705367678', '_blank');
    });

    render();

    document.getElementById("storeTab").addEventListener("click", () => {
  products = [...storeProducts];
  render();
});

document.getElementById("packagesTab").addEventListener("click", () => {
  products = [...packageProducts];
  render();
});

const WEBHOOK_URL = "https://discord.com/api/webhooks/1525509679654899757/q92MuVBBQQi4K4oivjNbInF-dmB2mWPkb4_bllJ-kS4gXFr9ykOJqg8L88P2MWmCCx2M";

document.getElementById('checkoutBtn').addEventListener('click', async () => {

  const rawId = (discordInput.value || "").trim();

  if (!cart.length) {
    showToastError("السلة فارغة!");
    return;
  }

  // تنظيف: أرقام فقط
  const cleanId = rawId.replace(/\D/g, '');

  // التحقق الصحيح
  if (cleanId.length < 17 || cleanId.length > 20) {
    showToastError("Discord ID غير صحيح! لازم يكون 17 إلى 20 رقم");
    return;
  }

  const orderText = cart.map(i =>
    `• ${i.title} ×${i.qty} = ${i.price * i.qty}$`
  ).join('\n');

  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);

  const payload = {
    content: "🛒 **طلب جديد من المتجر**",
    embeds: [{
      title: "تفاصيل الطلب",
      color: 0x8b5cf6,
      fields: [
        { name: "Discord ID", value: cleanId, inline: false },
        { name: "الطلب", value: orderText || "لا يوجد", inline: false },
        { name: "الإجمالي", value: total + " $", inline: true }
      ]
    }]
  };

  await fetch(WEBHOOK_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

showToast();

cart = [];
updateCart();
});

function showToastError(msg) {
  const toast = document.getElementById("toast");

  toast.innerHTML = `
    <div class="px-6 py-4 rounded-2xl bg-rose-500/10 border border-rose-500/40 shadow-2xl backdrop-blur-xl flex items-center gap-3">
      <div class="w-11 h-11 rounded-full bg-rose-500/20 flex items-center justify-center text-rose-400 text-2xl">
        ✖
      </div>

      <div class="text-center">
        <div class="font-black text-white text-sm">${msg}</div>
      </div>
    </div>
  `;

  toast.classList.remove("hidden");

  toast.style.animation = "none";
  toast.offsetHeight;
  toast.style.animation = "fadeInDown 0.4s ease";

  setTimeout(() => {
    toast.classList.add("hidden");
  }, 3000);
}
